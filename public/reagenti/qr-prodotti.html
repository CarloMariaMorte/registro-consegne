<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>QR Prodotti — Reagenti Lab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#fff;padding:20px;font-size:11px;color:#202124}
h1{font-size:16px;text-align:center;margin-bottom:20px}
.no-print{text-align:center;margin-bottom:20px}
.no-print button{padding:9px 24px;background:#1a73e8;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold}
.rep-block{margin-bottom:32px}
.rep-title{font-size:13px;font-weight:bold;color:#fff;background:#1a73e8;padding:7px 14px;border-radius:8px;margin-bottom:14px;display:inline-block}
.prod-grid{display:block}
.prod-row{display:flex;gap:12px;margin-bottom:12px;page-break-inside:avoid;break-inside:avoid}
.prod-card{flex:1;border:1.5px solid #dadce0;border-radius:12px;padding:14px 10px;text-align:center;background:#fafafa;box-sizing:border-box;min-width:0}
.prod-name{font-size:10px;font-weight:bold;line-height:1.3;min-height:28px;margin-bottom:4px}
.prod-code{font-family:monospace;font-size:10px;color:#5f6368;margin-bottom:10px}
.qr-wrap{display:flex;justify-content:center;margin-bottom:6px;background:#fff;padding:4px;border-radius:6px}
.qr-wrap img{display:block;width:150px;height:150px}
.qr-hint{font-size:9px;color:#aaa}
@media print{
  .no-print{display:none}
  body{padding:10px}
  .rep-block{page-break-after:always;break-after:page}
  .rep-block.last{page-break-after:avoid;break-after:avoid}
  .prod-row{page-break-inside:avoid;break-inside:avoid}
  .qr-wrap img{width:50mm;height:50mm}
  .prod-card{padding:8px 6px}
}
</style>
</head>

var root = document.getElementById('root');
var qid = 0;

var lastBlock = null;
Object.keys(REPARTI).forEach(function(rep){
  var prods = REPARTI[rep];
  if(!prods.length) return;
  var block = document.createElement('div');
  block.className = 'rep-block';
  block.innerHTML = '<div class="rep-title">'+rep+'</div>';
  var grid = document.createElement('div');
  grid.className = 'prod-grid';
  var row = null;
  prods.forEach(function(p, i){
    if(i % 3 === 0){
      row = document.createElement('div');
      row.className = 'prod-row';
      grid.appendChild(row);
    }
    var card = document.createElement('div');
    card.className = 'prod-card';
    var qurl='https://api.qrserver.com/v1/create-qr-code/?size=800x800&ecc=Q&margin=20&data='+encodeURIComponent(p.c);
    card.innerHTML =
      '<div class="prod-name">'+p.n+'</div>'+
      '<div class="prod-code">'+p.c+'</div>'+
      '<div class="qr-wrap"><img src="'+qurl+'" alt="QR '+p.c+'"></div>'+
      '<div class="qr-hint">scansiona con l\'app</div>';
    row.appendChild(card);
  });
  block.appendChild(grid);
  root.appendChild(block);
  lastBlock = block;
});
if(lastBlock) lastBlock.classList.add('last');

</script>

</html>
